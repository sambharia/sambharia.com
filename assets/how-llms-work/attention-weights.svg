<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="attnScale" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eef4fb"/>
      <stop offset="1" stop-color="#5a8fc7"/>
    </linearGradient>
  </defs>

  <rect width="520" height="480" fill="#ffffff"/>

  <!-- title -->
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">
    Attention weights &#8212; each row is a query, each column a key
  </text>
  <text x="260" y="48" text-anchor="middle" font-size="12" fill="#8a8a8a">
    darker = larger Q&#183;K score &#183; grey = masked (a token can&#8217;t see the future)
  </text>

  <!-- column headers -->
  <g font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="middle">
    <text x="220" y="76">her</text>
    <text x="320" y="76">investment</text>
    <text x="420" y="76">bank</text>
  </g>

  <!-- row labels -->
  <g font-size="14" font-weight="600" fill="#1a1a1a" text-anchor="end">
    <text x="158" y="135">her</text>
    <text x="158" y="235">investment</text>
    <text x="158" y="335">bank</text>
  </g>

  <!-- data cells (rounded pastel boxes) -->
  <g stroke="#b9cdea" stroke-width="1.3">
    <rect x="174" y="84"  width="92" height="92" rx="12" fill="#5a8fc7"/>
    <rect x="174" y="184" width="92" height="92" rx="12" fill="#cfe0f4"/>
    <rect x="274" y="184" width="92" height="92" rx="12" fill="#7fa9d8"/>
    <rect x="174" y="284" width="92" height="92" rx="12" fill="#dce7f7"/>
    <rect x="274" y="284" width="92" height="92" rx="12" fill="#9cc0e8"/>
    <rect x="374" y="284" width="92" height="92" rx="12" fill="#dce7f7"/>
  </g>

  <!-- masked cells (grey, matching tokenization theme) -->
  <g stroke="#d5d5d3" stroke-width="1.3" fill="#f0f0ee">
    <rect x="274" y="84"  width="92" height="92" rx="12"/>
    <rect x="374" y="84"  width="92" height="92" rx="12"/>
    <rect x="374" y="184" width="92" height="92" rx="12"/>
  </g>

  <!-- cell values -->
  <g font-size="16" font-weight="600" text-anchor="middle" fill="#24486f">
    <text x="220" y="136">1.0</text>
    <text x="220" y="236">0.24</text>
    <text x="320" y="236">0.76</text>
    <text x="220" y="336">0.2</text>
    <text x="320" y="336">0.6</text>
    <text x="420" y="336">0.2</text>
  </g>

  <!-- masked labels -->
  <g font-size="12" font-style="italic" fill="#adadad" text-anchor="middle">
    <text x="320" y="135">masked</text>
    <text x="420" y="135">masked</text>
    <text x="420" y="235">masked</text>
  </g>

  <!-- legend -->
  <rect x="170" y="420" width="200" height="14" rx="7" fill="url(#attnScale)" stroke="#b9cdea" stroke-width="1"/>
  <text x="170" y="452" text-anchor="start" font-size="12" fill="#8a8a8a">low attention</text>
  <text x="370" y="452" text-anchor="end"   font-size="12" fill="#8a8a8a">high attention</text>
</svg>
