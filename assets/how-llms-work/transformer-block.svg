<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="aDown" markerWidth="9" markerHeight="9" refX="4.5" refY="7" orient="auto">
      <path d="M0 0 L9 0 L4.5 8 z" fill="#bdbdbd"/>
    </marker>
  </defs>

  <rect width="560" height="540" fill="#ffffff"/>

  <!-- arrows (drawn first, behind boxes) -->
  <g stroke="#bdbdbd" stroke-width="1.6" fill="none">
    <line x1="280" y1="76"  x2="280" y2="96"  marker-end="url(#aDown)"/>
    <line x1="280" y1="146" x2="280" y2="166" marker-end="url(#aDown)"/>
    <line x1="280" y1="216" x2="280" y2="232" marker-end="url(#aDown)"/>
    <line x1="280" y1="262" x2="280" y2="282" marker-end="url(#aDown)"/>
    <line x1="280" y1="332" x2="280" y2="352" marker-end="url(#aDown)"/>
    <line x1="280" y1="402" x2="280" y2="418" marker-end="url(#aDown)"/>
    <line x1="280" y1="448" x2="280" y2="468" marker-end="url(#aDown)"/>
  </g>

  <!-- Input (grey) -->
  <rect x="70" y="28" width="420" height="48" rx="10" fill="#ffffff" stroke="#9a9a9a" stroke-width="1.6"/>
  <text x="280" y="58" text-anchor="middle" font-size="15" fill="#555">Input <tspan font-style="italic">x</tspan> &#8212; shape (<tspan font-style="italic">T</tspan>, 768)</text>

  <!-- LayerNorm (amber) -->
  <rect x="70" y="98" width="420" height="48" rx="10" fill="#fdf1d2" stroke="#e0b84e" stroke-width="1.6"/>
  <text x="280" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#a9801a">LayerNorm</text>

  <!-- Attention (blue) -->
  <rect x="70" y="168" width="420" height="48" rx="10" fill="#dce7f7" stroke="#b9cdea" stroke-width="1.6"/>
  <text x="280" y="198" text-anchor="middle" font-size="15" font-weight="700" fill="#2f5d9f">Multi-Head Self-Attention</text>

  <!-- residual 1 -->
  <text x="280" y="254" text-anchor="middle" font-size="17" font-weight="700" fill="#3a7d4f">&#8853; add residual</text>

  <!-- LayerNorm (amber) -->
  <rect x="70" y="284" width="420" height="48" rx="10" fill="#fdf1d2" stroke="#e0b84e" stroke-width="1.6"/>
  <text x="280" y="314" text-anchor="middle" font-size="15" font-weight="700" fill="#a9801a">LayerNorm</text>

  <!-- MLP (soft red) -->
  <rect x="70" y="354" width="420" height="48" rx="10" fill="#f6e3df" stroke="#d29a90" stroke-width="1.6"/>
  <text x="280" y="384" text-anchor="middle" font-size="15" font-weight="700" fill="#9a3b30">MLP (768 &#8594; 3072 &#8594; 768)</text>

  <!-- residual 2 -->
  <text x="280" y="440" text-anchor="middle" font-size="17" font-weight="700" fill="#3a7d4f">&#8853; add residual</text>

  <!-- Output (grey) -->
  <rect x="70" y="470" width="420" height="48" rx="10" fill="#ffffff" stroke="#9a9a9a" stroke-width="1.6"/>
  <text x="280" y="500" text-anchor="middle" font-size="15" fill="#555">Output <tspan font-style="italic">x</tspan> &#8212; shape (<tspan font-style="italic">T</tspan>, 768)</text>
</svg>
