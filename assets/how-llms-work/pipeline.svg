<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="pDown" markerWidth="10" markerHeight="10" refX="5" refY="8" orient="auto">
      <path d="M1 1 L9 1 L5 8 z" fill="#8a8f98"/>
    </marker>
    <marker id="pDownDark" markerWidth="10" markerHeight="10" refX="5" refY="8" orient="auto">
      <path d="M1 1 L9 1 L5 8 z" fill="#6b7178"/>
    </marker>
  </defs>

  <rect width="860" height="900" fill="#ffffff"/>

  <!-- arrows (drawn first, behind boxes) -->
  <g stroke="#8a8f98" stroke-width="1.8" stroke-linecap="round" fill="none">
    <line x1="220" y1="40"  x2="220" y2="56"  marker-end="url(#pDown)"/>
    <line x1="220" y1="100" x2="220" y2="116" marker-end="url(#pDown)"/>
    <line x1="220" y1="156" x2="220" y2="172" marker-end="url(#pDown)"/>
    <line x1="220" y1="216" x2="220" y2="233" marker-end="url(#pDown)"/>
    <line x1="220" y1="265" x2="220" y2="283" marker-end="url(#pDown)"/>
    <!-- inside transformer block -->
    <line x1="220" y1="338" x2="220" y2="354" marker-end="url(#pDown)"/>
    <line x1="220" y1="394" x2="220" y2="410" marker-end="url(#pDown)"/>
    <line x1="220" y1="432" x2="220" y2="450" marker-end="url(#pDown)"/>
    <line x1="220" y1="490" x2="220" y2="506" marker-end="url(#pDown)"/>
    <line x1="220" y1="546" x2="220" y2="562" marker-end="url(#pDown)"/>
    <!-- exit block -->
    <line x1="220" y1="592" x2="220" y2="610" marker-end="url(#pDown)"/>
  </g>

  <!-- output head internal arrows (darker, to read as "inside the same box") -->
  <g stroke="#6b7178" stroke-width="1.6" stroke-linecap="round" fill="none">
    <line x1="220" y1="680" x2="220" y2="694" marker-end="url(#pDownDark)"/>
    <line x1="220" y1="750" x2="220" y2="766" marker-end="url(#pDownDark)"/>
  </g>

  <g stroke="#8a8f98" stroke-width="1.8" stroke-linecap="round" fill="none">
    <line x1="220" y1="832" x2="220" y2="852" marker-end="url(#pDown)"/>
  </g>

  <!-- input text -->
  <text x="220" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">The cat sat</text>

  <!-- tokenizer -->
  <rect x="120" y="58" width="200" height="42" rx="10" fill="#ffffff" stroke="#9a9a9a" stroke-width="1.6"/>
  <text x="220" y="85" text-anchor="middle" font-size="15" fill="#444">tokenizer</text>

  <!-- token IDs (purple) -->
  <g stroke="#cdb9ec" stroke-width="1.4" fill="#e8ddf6">
    <rect x="130" y="122" width="56" height="34" rx="9"/>
    <rect x="192" y="122" width="56" height="34" rx="9"/>
    <rect x="254" y="122" width="56" height="34" rx="9"/>
  </g>
  <g font-size="14" font-weight="600" fill="#5b3fa0" text-anchor="middle" font-family="'SF Mono', Menlo, Consolas, monospace">
    <text x="158" y="144">791</text>
    <text x="220" y="144">9059</text>
    <text x="282" y="144">7731</text>
  </g>

  <!-- embedding lookup -->
  <rect x="120" y="174" width="200" height="42" rx="10" fill="#ffffff" stroke="#9a9a9a" stroke-width="1.6"/>
  <text x="220" y="201" text-anchor="middle" font-size="15" fill="#444">embedding lookup</text>

  <!-- positional encoding (green plus) -->
  <circle cx="220" cy="250" r="15" fill="#e1efd8" stroke="#3a7d4f" stroke-width="1.5"/>
  <text x="220" y="256" text-anchor="middle" font-size="18" font-weight="700" fill="#3a7d4f">+</text>
  <text x="245" y="255" text-anchor="start" font-size="13" fill="#7a7a7a">positional encoding</text>

  <!-- transformer block container -->
  <rect x="108" y="283" width="224" height="309" rx="14" fill="#fbfbfa" stroke="#cbcbcb" stroke-width="1.6"/>
  <text x="98" y="533" text-anchor="end" font-size="13" fill="#7a7a7a">transformer</text>
  <text x="98" y="551" text-anchor="end" font-size="13" fill="#7a7a7a">block &#215; N</text>

  <!-- LayerNorm (amber) -->
  <rect x="135" y="300" width="170" height="38" rx="10" fill="#fdf1d2" stroke="#e0b84e" stroke-width="1.5"/>
  <text x="220" y="324" text-anchor="middle" font-size="14" font-weight="700" fill="#a9801a">LayerNorm</text>

  <!-- attention (blue) -->
  <rect x="135" y="356" width="170" height="38" rx="10" fill="#dce7f7" stroke="#b9cdea" stroke-width="1.5"/>
  <text x="220" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="#2f5d9f">attention</text>

  <!-- residual 1 -->
  <text x="220" y="427" text-anchor="middle" font-size="14" font-weight="700" fill="#3a7d4f">&#8853; add residual</text>

  <!-- LayerNorm (amber) -->
  <rect x="135" y="452" width="170" height="38" rx="10" fill="#fdf1d2" stroke="#e0b84e" stroke-width="1.5"/>
  <text x="220" y="476" text-anchor="middle" font-size="14" font-weight="700" fill="#a9801a">LayerNorm</text>

  <!-- FFN (soft red) -->
  <rect x="135" y="508" width="170" height="38" rx="10" fill="#f6e3df" stroke="#d29a90" stroke-width="1.5"/>
  <text x="220" y="532" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3b30">FFN (MLP)</text>

  <!-- residual 2 -->
  <text x="220" y="579" text-anchor="middle" font-size="14" font-weight="700" fill="#3a7d4f">&#8853; add residual</text>

  <!-- ==================== output head: final LayerNorm -> LM head -> softmax ==================== -->
  <rect x="108" y="610" width="224" height="222" rx="14" fill="#fbfbfa" stroke="#cbcbcb" stroke-width="1.6"/>
  <text x="98" y="715" text-anchor="end" font-size="13" fill="#7a7a7a">output</text>
  <text x="98" y="733" text-anchor="end" font-size="13" fill="#7a7a7a">head</text>

  <!-- final LayerNorm (amber) -->
  <rect x="135" y="622" width="170" height="36" rx="10" fill="#fdf1d2" stroke="#e0b84e" stroke-width="1.5"/>
  <text x="220" y="645" text-anchor="middle" font-size="14" font-weight="700" fill="#a9801a">final LayerNorm</text>
  <text x="220" y="671" text-anchor="middle" font-size="11" fill="#8a8a8a">still a 768-dim vector (X&#8242;)</text>

  <!-- LM head, reused embedding matrix (purple, ties back to token IDs) -->
  <rect x="135" y="694" width="170" height="36" rx="10" fill="#e8ddf6" stroke="#cdb9ec" stroke-width="1.5"/>
  <text x="220" y="717" text-anchor="middle" font-size="14" font-weight="700" fill="#5b3fa0">LM head</text>
  <text x="220" y="743" text-anchor="middle" font-size="11" fill="#8a8a8a">= WTE, transposed &#8594; 1 logit / token</text>

  <!-- softmax (amber) -->
  <rect x="135" y="766" width="170" height="36" rx="10" fill="#fdf1d2" stroke="#e0b84e" stroke-width="1.6"/>
  <text x="220" y="789" text-anchor="middle" font-size="14" font-weight="700" fill="#a9801a">softmax</text>
  <text x="220" y="815" text-anchor="middle" font-size="11" fill="#8a8a8a">probabilities, sum to 1</text>

  <!-- output text -->
  <text x="220" y="872" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">next token</text>

  <!-- ==================== multi-head zoom-out ==================== -->
  <!-- zoom guide lines from the attention box out to the panel -->
  <g stroke="#c7cbd1" stroke-width="1.3" stroke-dasharray="4 4" fill="none">
    <line x1="305" y1="357" x2="384" y2="312"/>
    <line x1="305" y1="393" x2="384" y2="470"/>
  </g>

  <!-- panel -->
  <rect x="384" y="300" width="452" height="185" rx="14" fill="#fcfcfb" stroke="#e2e2df" stroke-width="1.4"/>
  <text x="610" y="325" text-anchor="middle" font-size="14" font-weight="600" fill="#2f5d9f">attention = several heads in parallel</text>
  <text x="610" y="343" text-anchor="middle" font-size="12" fill="#8a8a8a">each head looks at a different relationship between words</text>

  <!-- head boxes -->
  <g stroke-width="1.5">
    <rect x="418" y="356" width="72" height="40" rx="9" fill="#dce7f7" stroke="#b9cdea"/>
    <rect x="506" y="356" width="72" height="40" rx="9" fill="#e1efd8" stroke="#a9cdb0"/>
    <rect x="594" y="356" width="72" height="40" rx="9" fill="#e8ddf6" stroke="#cdb9ec"/>
    <rect x="682" y="356" width="72" height="40" rx="9" fill="#fbe4d3" stroke="#eec3a3"/>
  </g>
  <g font-size="12" font-weight="600" text-anchor="middle">
    <text x="454" y="380" fill="#2f5d9f">grammar</text>
    <text x="542" y="380" fill="#3a7d4f">meaning</text>
    <text x="630" y="380" fill="#5b3fa0">position</text>
    <text x="718" y="380" fill="#c2612a">patterns</text>
  </g>
  <text x="790" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#9a9a9a">&#8230; &#215;12</text>

  <!-- converging arrows into concat -->
  <g stroke="#8a8f98" stroke-width="1.6" stroke-linecap="round" fill="none">
    <line x1="454" y1="396" x2="588" y2="428" marker-end="url(#pDown)"/>
    <line x1="542" y1="396" x2="600" y2="428" marker-end="url(#pDown)"/>
    <line x1="630" y1="396" x2="620" y2="428" marker-end="url(#pDown)"/>
    <line x1="718" y1="396" x2="632" y2="428" marker-end="url(#pDown)"/>
  </g>

  <!-- concat + mix pill -->
  <rect x="530" y="432" width="160" height="34" rx="17" fill="#ffffff" stroke="#9a9a9a" stroke-width="1.6"/>
  <text x="610" y="454" text-anchor="middle" font-size="14" font-weight="700" fill="#444">concat + mix</text>
  <text x="610" y="479" text-anchor="middle" font-size="12" fill="#8a8a8a">&#8594; one vector per token, back into the stream</text>
</svg>
