title:               Siddharth Sambharia
description:         "Writing about technology, AI, and ideas. Working at Portkey."
author:              Siddharth Sambharia
twitter_username:    sambharia
og_image:            /images/me.jpg

google_analytics:    G-NY98ZNQCHH

include:             ['_pages']
exclude:             ['_includes/notes_graph.json']
# Deployed to a custom domain (see CNAME) via Netlify.
# baseurl must be empty for a root-domain deploy; url is the canonical origin
# used for canonical tags, Open Graph, JSON-LD, sitemap, feed and llms.txt.
baseurl: ''
url: 'https://sambharia.com'

# If you are using a host that cannot resolve URLs that do
# not end with .html (such as Neocities), set this to 'true'.
use_html_extension:  false

# Set to `true` to open non-internal links in new tabs, or
# set to `false` to open non-internal links in current tab.
open_external_links_in_new_tab: true

# Set to `true` to replace tweet URLs with Twitter embeds.
# Note that doing so will negatively the reader's privacy
# as their browser will communicate with Twitter's servers.
embed_tweets: true

permalink:           pretty
relative_permalinks: false

plugins:
  - jekyll-last-modified-at
  - jekyll-sitemap

# llms.txt generation (custom plugin: _plugins/llms_txt_generator.rb).
# Everything below is optional — the plugin auto-generates from your notes
# if you leave it alone. You never need to edit this when adding a new post.
llms:
  # Short blockquote summary shown at the top of /llms.txt
  summary: >-
    Personal site and digital garden of Siddharth Sambharia — essays and notes
    on AI, LLMs, agents, and building things. Working at Portkey.
  # Also emit /llms-full.txt with the full markdown of every note inlined.
  full: true

sass:
  sass_dir:          _sass
  style:            :compressed

collections:
  notes:
    output: true
    permalink: /:slug

defaults:
  - scope:
      path: "**/*"
    values:
      layout: "default"
  - scope:
      path: "_notes/**/*.md"
    values:
      layout: "note"
